spring.application.name=quizze

server.port=9090

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Quizze}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin@123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.error.include-message=always

app.jwt.secret=${JWT_SECRET:TiEMSw/z432fU7oHKkdOk+pgDoETMgtvuFztc45yF1i9l3qCDOMhVGgZMWF8LSGpJhuVMBpmdU09zCZtq9HCAw==}
app.jwt.expiration=86400000

logging.level.root=info
logging.level.com.quizze.quizze=DEBUG

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from-address=${APP_MAIL_FROM_ADDRESS:no-reply@quizze.local}
app.mail.from-name=${APP_MAIL_FROM_NAME:Quizze}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
