spring.application.name=quizze

server.port=9090

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Quizze}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin@123}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.error.include-message=always

app.jwt.secret=${JWT_SECRET:TiEMSw/z432fU7oHKkdOk+pgDoETMgtvuFztc45yF1i9l3qCDOMhVGgZMWF8LSGpJhuVMBpmdU09zCZtq9HCAw==}
app.jwt.expiration=86400000

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=unrestricted
management.info.env.enabled=true
management.metrics.tags.application=${spring.application.name}
info.app.name=${spring.application.name}
info.app.description=Online quiz platform backend built with Spring Boot
info.app.version=0.0.1-SNAPSHOT

logging.level.root=info
logging.level.com.quizze.quizze=DEBUG

app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from-address=${APP_MAIL_FROM_ADDRESS:no-reply@quizze.local}
app.mail.from-name=${APP_MAIL_FROM_NAME:Quizze}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.quizze.quizze.notification.kafka
spring.kafka.listener.auto-startup=${APP_KAFKA_LISTENERS_ENABLED:false}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

app.cache.quiz-leaderboard-ttl-minutes=${APP_CACHE_QUIZ_LEADERBOARD_TTL_MINUTES:10}
app.cache.quiz-analytics-ttl-minutes=${APP_CACHE_QUIZ_ANALYTICS_TTL_MINUTES:15}
app.cache.question-analytics-ttl-minutes=${APP_CACHE_QUESTION_ANALYTICS_TTL_MINUTES:15}
app.cache.admin-overview-ttl-minutes=${APP_CACHE_ADMIN_OVERVIEW_TTL_MINUTES:10}
app.cache.user-performance-ttl-minutes=${APP_CACHE_USER_PERFORMANCE_TTL_MINUTES:10}
app.cache.redis-enabled=${APP_CACHE_REDIS_ENABLED:false}

app.notifications.new-quiz.enabled=${APP_NOTIFICATIONS_NEW_QUIZ_ENABLED:false}
app.notifications.new-quiz.topic=${APP_NOTIFICATIONS_NEW_QUIZ_TOPIC:quizze.new-quiz-published}
app.notifications.new-quiz.consumer-group-id=${APP_NOTIFICATIONS_NEW_QUIZ_GROUP_ID:quizze-new-quiz-mailer}
app.notifications.new-quiz.batch-size=${APP_NOTIFICATIONS_NEW_QUIZ_BATCH_SIZE:10}
app.notifications.new-quiz.max-retry-attempts=${APP_NOTIFICATIONS_NEW_QUIZ_MAX_RETRY_ATTEMPTS:2}
app.notifications.quiz-result.enabled=${APP_NOTIFICATIONS_QUIZ_RESULT_ENABLED:false}
app.notifications.quiz-result.topic=${APP_NOTIFICATIONS_QUIZ_RESULT_TOPIC:quizze.quiz-submitted}
app.notifications.quiz-result.consumer-group-id=${APP_NOTIFICATIONS_QUIZ_RESULT_GROUP_ID:quizze-quiz-result-mailer}
app.notifications.quiz-result.max-retry-attempts=${APP_NOTIFICATIONS_QUIZ_RESULT_MAX_RETRY_ATTEMPTS:2}
